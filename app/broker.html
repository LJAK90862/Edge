<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>broker — edge energy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g700:#2D6A4F;--g500:#40916C;--g300:#52B788;--g100:#95D5B2;
  --b900:#0F2340;--b700:#1A3A5C;--b300:#2E86C1;
  --slate:#0D1B2A;--mid:#4A5568;--soft:#8896A6;
  --cream:#F8F9FA;--warm:#F0F4F8;--border:#E2E8F0;--white:#fff;
  --serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
}
body{font-family:var(--sans);background:var(--warm);color:var(--slate);font-weight:300;min-height:100vh;}
nav{background:var(--slate);padding:1rem 5vw;display:flex;justify-content:space-between;align-items:center;}
.nav-logo-text{font-family:var(--sans);font-size:1rem;font-weight:600;color:#fff;}
.nav-logo-text span{color:var(--g300);}
.nav-badge{font-size:0.68rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.4);}
.container{max-width:1100px;margin:0 auto;padding:40px 20px 80px;display:grid;grid-template-columns:300px 1fr;gap:20px;}
.panel{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--border);font-family:var(--serif);font-size:1rem;font-weight:700;color:var(--slate);}

/* DEALS LIST */
.deal-item{padding:16px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;}
.deal-item:hover{background:var(--warm);}
.deal-item.active{background:var(--warm);border-left:3px solid var(--g700);}
.deal-company{font-weight:600;font-size:0.9rem;color:var(--slate);margin-bottom:3px;}
.deal-meta{font-size:0.75rem;color:var(--soft);}
.deal-unread{display:inline-block;background:var(--g700);color:#fff;border-radius:10px;padding:1px 7px;font-size:0.65rem;font-weight:600;margin-left:6px;}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;}
.dot-pending{background:#F59E0B;}
.dot-loa_signed{background:var(--b300);}
.dot-quotes_presented{background:var(--g500);}
.dot-won{background:var(--g700);}

/* DEAL DETAIL */
.detail-panel{display:flex;flex-direction:column;height:calc(100vh - 140px);}
.detail-header{padding:20px 24px;border-bottom:1px solid var(--border);}
.detail-company{font-family:var(--serif);font-size:1.4rem;font-weight:900;color:var(--slate);}
.detail-meta{font-size:0.78rem;color:var(--soft);margin-top:4px;}
.detail-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 24px;}
.tab{padding:12px 16px;font-size:0.82rem;font-weight:500;color:var(--soft);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;}
.tab.active{color:var(--g700);border-bottom-color:var(--g700);}
.tab-content{flex:1;overflow-y:auto;padding:20px 24px;}
.tab-pane{display:none;}
.tab-pane.active{display:block;}

/* CHAT */
.chat-messages{display:flex;flex-direction:column;gap:12px;margin-bottom:16px;}
.msg{display:flex;flex-direction:column;max-width:75%;}
.msg.client{align-self:flex-start;}
.msg.broker{align-self:flex-end;align-items:flex-end;}
.msg-bubble{padding:10px 14px;border-radius:12px;font-size:0.875rem;line-height:1.6;}
.msg.client .msg-bubble{background:var(--warm);border:1px solid var(--border);color:var(--slate);border-bottom-left-radius:3px;}
.msg.broker .msg-bubble{background:var(--g700);color:#fff;border-bottom-right-radius:3px;}
.msg-label{font-size:0.65rem;color:var(--soft);margin-top:4px;padding:0 4px;}
.reply-row{display:flex;gap:8px;padding:16px 24px;border-top:1px solid var(--border);background:var(--warm);}
.reply-input{flex:1;background:var(--white);border:1px solid var(--border);padding:10px 14px;font-family:var(--sans);font-size:0.875rem;border-radius:8px;outline:none;resize:none;}
.reply-input:focus{border-color:var(--g700);}
.reply-btn{background:var(--g700);color:#fff;border:none;padding:10px 18px;border-radius:8px;font-family:var(--sans);font-size:0.875rem;font-weight:500;cursor:pointer;}

/* QUOTES */
.quote-form{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.form-field{display:flex;flex-direction:column;gap:4px;}
.form-field label{font-size:0.72rem;font-weight:500;color:var(--mid);}
.form-field input{background:var(--white);border:1px solid var(--border);padding:8px 12px;font-family:var(--sans);font-size:0.875rem;border-radius:6px;outline:none;}
.form-field input:focus{border-color:var(--g700);}
.btn{padding:10px 20px;border-radius:6px;font-family:var(--sans);font-size:0.875rem;font-weight:500;border:none;cursor:pointer;}
.btn-primary{background:var(--g700);color:#fff;}
.btn-blue{background:var(--b700);color:#fff;}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-item{background:var(--warm);border-radius:8px;padding:12px;}
.info-label{font-size:0.68rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--soft);margin-bottom:4px;}
.info-value{font-size:0.875rem;font-weight:500;color:var(--slate);}
.status-select{background:var(--white);border:1px solid var(--border);padding:6px 10px;border-radius:6px;font-family:var(--sans);font-size:0.82rem;color:var(--slate);outline:none;}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--soft);}
.empty-state p{font-size:0.875rem;margin-top:8px;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:80vh;}
.login-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:40px;max-width:360px;width:100%;text-align:center;}
.login-card h2{font-family:var(--serif);font-size:1.6rem;font-weight:900;margin-bottom:8px;}
.login-card p{font-size:0.875rem;color:var(--mid);margin-bottom:24px;}
.login-input{width:100%;background:var(--warm);border:1px solid var(--border);padding:12px 16px;font-family:var(--sans);font-size:0.9rem;border-radius:8px;outline:none;margin-bottom:12px;}
.login-btn{width:100%;background:var(--b700);color:#fff;border:none;padding:12px;font-family:var(--sans);font-size:0.9rem;font-weight:500;border-radius:8px;cursor:pointer;}

@media(max-width:800px){
  .container{grid-template-columns:1fr;}
  .quote-form{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<nav>
  <div style="display:flex;align-items:center;gap:10px;">
    <svg width="20" height="24" viewBox="0 0 40 46" fill="none">
      <defs><linearGradient id="a" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#52B788"/><stop offset="100%" stop-color="#2D6A4F"/></linearGradient><linearGradient id="b" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#74C69D"/><stop offset="100%" stop-color="#40916C"/></linearGradient><linearGradient id="c" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#95D5B2"/><stop offset="100%" stop-color="#74C69D"/></linearGradient></defs>
      <path d="M2 36 L10 18 L15 18 L9 33 L22 33 L14 44 L9 44 L16 34 Z" fill="url(#a)" opacity="0.55"/>
      <path d="M6 27 L14 9 L19 9 L13 24 L26 24 L18 43 L13 43 L20 26 Z" fill="url(#b)" opacity="0.8"/>
      <path d="M10 18 L18 2 L23 2 L17 15 L30 15 L22 34 L17 34 L24 17 Z" fill="url(#c)"/>
    </svg>
    <span class="nav-logo-text">edge energy<span>.</span></span>
  </div>
  <span class="nav-badge">broker portal</span>
</nav>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h2>broker login</h2>
    <p>enter your broker key to access the portal</p>
    <input type="password" class="login-input" id="broker-key" placeholder="broker key" onkeydown="if(event.key==='Enter')login()" />
    <button class="login-btn" onclick="login()">sign in →</button>
  </div>
</div>

<!-- Main portal -->
<div id="main" style="display:none;">
  <div class="container">

    <!-- Deals list -->
    <div class="panel">
      <div class="panel-header">all deals</div>
      <div id="deals-list"></div>
    </div>

    <!-- Deal detail -->
    <div class="panel detail-panel" id="deal-detail">
      <div class="empty-state">
        <div style="font-size:2rem;">👈</div>
        <p>select a deal to view details</p>
      </div>
    </div>

  </div>
</div>

<script>
const API_BASE = 'https://app.edge-energy.uk';
const BROKER_KEY = 'edge-broker-2026'; // Change this in production
let selectedDealId = null;
let brokerKey = null;
let allDeals = [];
let pollTimer = null;

function login() {
  const key = document.getElementById('broker-key').value.trim();
  if (key !== BROKER_KEY) { alert('invalid key'); return; }
  brokerKey = key;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  loadDeals();
}

async function loadDeals() {
  try {
    const res = await fetch(`${API_BASE}/api/broker/deals`, {
      headers: { 'x-broker-key': brokerKey }
    });
    const data = await res.json();
    allDeals = data.deals || [];
    renderDealsList();
  } catch(e) { console.error(e); }
}

function renderDealsList() {
  const container = document.getElementById('deals-list');
  if (!allDeals.length) {
    container.innerHTML = '<div class="empty-state"><p>no deals yet</p></div>';
    return;
  }
  container.innerHTML = allDeals.map(d => `
    <div class="deal-item ${d.id === selectedDealId ? 'active' : ''}" onclick="openDeal('${d.id}')">
      <div class="deal-company">
        <span class="status-dot dot-${d.status}"></span>
        ${d.company}
        ${d.unread_count > 0 ? `<span class="deal-unread">${d.unread_count}</span>` : ''}
      </div>
      <div class="deal-meta">${d.name} · ${d.status.replace(/_/g,' ')}</div>
    </div>
  `).join('');
}

async function openDeal(dealId) {
  selectedDealId = dealId;
  renderDealsList();

  const deal = allDeals.find(d => d.id === dealId);
  if (!deal) return;

  // Load messages and quotes
  const [msgRes, quotesRes] = await Promise.all([
    fetch(`${API_BASE}/api/broker/messages/${dealId}`, { headers: { 'x-broker-key': brokerKey } }),
    fetch(`${API_BASE}/api/broker/quotes/${dealId}`, { headers: { 'x-broker-key': brokerKey } })
  ]);
  const { messages } = await msgRes.json();
  const { quotes } = await quotesRes.json();

  renderDealDetail(deal, messages, quotes);

  // Poll for new messages
  clearInterval(pollTimer);
  pollTimer = setInterval(() => refreshMessages(dealId), 10000);
}

async function refreshMessages(dealId) {
  const res = await fetch(`${API_BASE}/api/broker/messages/${dealId}`, {
    headers: { 'x-broker-key': brokerKey }
  });
  const { messages } = await res.json();
  renderMessages(messages);
  loadDeals(); // refresh unread counts
}

function formatTime(iso) {
  const d = new Date(iso);
  const diffMins = Math.floor((new Date() - d) / 60000);
  if (diffMins < 1) return 'just now';
  if (diffMins < 60) return `${diffMins}m ago`;
  if (diffMins < 1440) return `${Math.floor(diffMins/60)}h ago`;
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function renderMessages(messages) {
  const container = document.getElementById('chat-thread');
  if (!container) return;
  if (!messages || messages.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>no messages yet</p></div>';
    return;
  }
  container.innerHTML = messages.map(m => `
    <div class="msg ${m.sender}">
      <div class="msg-bubble">${m.body.replace(/\n/g,'<br>')}</div>
      <div class="msg-label">${m.sender === 'client' ? 'client' : 'you'} · ${formatTime(m.created_at)}</div>
    </div>
  `).join('');
  container.scrollTop = container.scrollHeight;
}

function renderDealDetail(deal, messages, quotes) {
  const panel = document.getElementById('deal-detail');
  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-company">${deal.company}</div>
      <div class="detail-meta">${deal.name} · ${deal.email} · ${deal.phone || '—'}</div>
    </div>
    <div class="detail-tabs">
      <div class="tab active" onclick="switchTab('chat')">chat</div>
      <div class="tab" onclick="switchTab('quotes')">quotes</div>
      <div class="tab" onclick="switchTab('info')">info</div>
    </div>

    <!-- Chat tab -->
    <div class="tab-pane active" id="tab-chat">
      <div class="chat-messages" id="chat-thread"></div>
    </div>

    <!-- Quotes tab -->
    <div class="tab-pane" id="tab-quotes">
      <p style="font-size:0.82rem;color:var(--mid);margin-bottom:16px;">add quotes from suppliers below. they'll appear instantly in the client's deal room.</p>
      <div class="quote-form">
        <div class="form-field"><label>supplier name</label><input type="text" id="q-supplier" placeholder="e.g. Octopus Energy" /></div>
        <div class="form-field"><label>unit rate (p/kWh)</label><input type="number" id="q-rate" placeholder="e.g. 21.3" step="0.1" /></div>
        <div class="form-field"><label>standing charge (p/day)</label><input type="number" id="q-standing" placeholder="e.g. 42" step="0.1" /></div>
        <div class="form-field"><label>contract length (months)</label><input type="number" id="q-length" placeholder="e.g. 24" /></div>
        <div class="form-field"><label>quote reference</label><input type="text" id="q-ref" placeholder="optional" /></div>
      </div>
      <button class="btn btn-primary" onclick="addQuote('${deal.id}')">add quote →</button>
      <div id="quotes-list" style="margin-top:20px;">${renderQuotesList(quotes)}</div>
    </div>

    <!-- Info tab -->
    <div class="tab-pane" id="tab-info">
      <div style="margin-bottom:16px;display:flex;align-items:center;gap:10px;">
        <span style="font-size:0.82rem;color:var(--mid);">status:</span>
        <select class="status-select" onchange="updateStatus('${deal.id}', this.value)">
          ${['pending','loa_sent','loa_signed','quotes_requested','quotes_presented','contract_sent','won','lost'].map(s =>
            `<option value="${s}" ${deal.status===s?'selected':''}>${s.replace(/_/g,' ')}</option>`
          ).join('')}
        </select>
        <a href="${API_BASE}/${deal.id}?token=${deal.magic_token}" target="_blank" class="btn btn-blue" style="font-size:0.78rem;padding:6px 14px;">view client portal →</a>
      </div>
      <div class="info-grid">
        ${[
          ['annual kWh', deal.annual_kwh ? Number(deal.annual_kwh).toLocaleString() + ' kWh' : '—'],
          ['current supplier', deal.current_supplier || '—'],
          ['contract end', deal.contract_end_date || '—'],
          ['mpan', deal.mpan || '—'],
          ['profile class', deal.profile_class || '—'],
          ['current rate', deal.current_unit_rate ? deal.current_unit_rate + 'p/kWh' : '—'],
          ['loa signed', deal.loa_signed_at ? new Date(deal.loa_signed_at).toLocaleDateString('en-GB') : '—'],
          ['hubspot deal', deal.hubspot_deal_id || '—'],
        ].map(([l,v]) => `<div class="info-item"><div class="info-label">${l}</div><div class="info-value">${v}</div></div>`).join('')}
      </div>
    </div>

    <!-- Reply input (always visible) -->
    <div class="reply-row">
      <textarea class="reply-input" id="reply-input" placeholder="reply to client…" rows="1" onkeydown="handleReplyKey(event,'${deal.id}')"></textarea>
      <button class="reply-btn" onclick="sendReply('${deal.id}')">send</button>
    </div>
  `;

  renderMessages(messages);
}

function renderQuotesList(quotes) {
  if (!quotes || quotes.length === 0) return '<p style="color:var(--soft);font-size:0.82rem;">no quotes added yet</p>';
  return quotes.map(q => `
    <div style="background:var(--warm);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div style="font-weight:600;font-size:0.9rem;">${q.supplier_name}</div>
        <div style="font-size:0.78rem;color:var(--mid);">${q.unit_rate}p/kWh · ${q.standing_charge || '—'}p/day · ${q.contract_length || '—'} months</div>
      </div>
      <div style="font-size:0.72rem;color:var(--soft);">${q.is_selected ? '✓ selected' : ''}</div>
    </div>
  `).join('');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const tabs = ['chat','quotes','info'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
}

async function sendReply(dealId) {
  const input = document.getElementById('reply-input');
  const body = input.value.trim();
  if (!body) return;
  input.value = '';
  await fetch(`${API_BASE}/api/messages`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ dealId, token: 'broker', body, sender: 'broker', brokerKey })
  });
  await refreshMessages(dealId);
}

function handleReplyKey(e, dealId) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(dealId); }
}

async function addQuote(dealId) {
  const quote = {
    dealId,
    supplierName: document.getElementById('q-supplier').value.trim(),
    unitRate: parseFloat(document.getElementById('q-rate').value),
    standingCharge: parseFloat(document.getElementById('q-standing').value) || null,
    contractLength: parseInt(document.getElementById('q-length').value) || null,
    quoteRef: document.getElementById('q-ref').value.trim() || null,
  };
  if (!quote.supplierName || !quote.unitRate) { alert('supplier name and unit rate required'); return; }
  await fetch(`${API_BASE}/api/broker/quotes`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-broker-key': brokerKey },
    body: JSON.stringify(quote)
  });
  openDeal(dealId);
}

async function updateStatus(dealId, status) {
  await fetch(`${API_BASE}/api/broker/deals/${dealId}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', 'x-broker-key': brokerKey },
    body: JSON.stringify({ status })
  });
  loadDeals();
}

// Poll deals every 30s
setInterval(loadDeals, 30000);
</script>
</body>
</html>
